<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #f5f7fa, #e4ecfb);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        background: #fff;
        padding: 50px 40px;
        width: 100%;
        max-width: 500px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        text-align: center;
    }

    /* Logo */
    .logo-text {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 25px;
    }

    .logo-text .green {
        color: #2e9e4f;
    }

    .logo-text .black {
        color: #000;
    }

    h2 {
        margin-bottom: 10px;
        font-size: 26px;
    }

    p {
        color: #666;
        margin-bottom: 30px;
        font-size: 15px;
    }

    label {
        display: block;
        text-align: left;
        margin-bottom: 6px;
        font-weight: bold;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 12px;
        font-size: 14px;
        transition: 0.3s;
    }

    input:focus {
        border-color: #2d6cdf;
        outline: none;
    }

    input.error {
        border-color: red;
    }

    .error-text {
        color: red;
        font-size: 13px;
        text-align: left;
        margin-bottom: 10px;
        display: none;
    }

    .success-text {
        color: green;
        font-size: 14px;
        margin-bottom: 15px;
        display: none;
    }

    .password-rules {
        background: #f9fafb;
        border: 1px solid #ddd;
        padding: 14px;
        border-radius: 10px;
        text-align: left;
        margin-bottom: 25px;
        font-size: 14px;
    }

    .valid {
        color: green;
    }

    button {
        width: 100%;
        padding: 16px;
        background-color: #1e5cc6;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #174aa3;
    }

    /* Responsive */
    @media (max-width: 600px) {
        .container {
            padding: 35px 25px;
        }

        h2 {
            font-size: 22px;
        }

        .logo-text {
            font-size: 24px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <!-- Logo -->
    <div class="logo-text">
        🎓 <span class="black">Student</span><span class="green">Job</span><span class="black">Expert</span>
    </div>

    <h2>Change Your Password</h2>
    <p>Enter a new password below to change your password.</p>

    <div class="success-text" id="successMsg">
        ✅ Your password has been successfully reset!
    </div>

    <form id="passwordForm">
        <label>New password *</label>
        <input type="password" id="password">
        <div class="error-text" id="passwordError"></div>

        <label>Re-enter new password *</label>
        <input type="password" id="confirmPassword">
        <div class="error-text" id="confirmError"></div>

        <div class="password-rules">
            <strong>Your password must contain:</strong><br>
            <span id="lengthRule">❌ At least 10 characters in length</span>
        </div>

        <button type="submit">Reset password</button>
    </form>
</div>

<script>
const form = document.getElementById("passwordForm");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");

const passwordError = document.getElementById("passwordError");
const confirmError = document.getElementById("confirmError");
const successMsg = document.getElementById("successMsg");
const lengthRule = document.getElementById("lengthRule");

// Live validation
password.addEventListener("input", () => {
    if (password.value.length >= 10) {
        lengthRule.textContent = "✔ At least 10 characters in length";
        lengthRule.classList.add("valid");
    } else {
        lengthRule.textContent = "❌ At least 10 characters in length";
        lengthRule.classList.remove("valid");
    }
});

form.addEventListener("submit", function(e) {
    e.preventDefault();

    passwordError.style.display = "none";
    confirmError.style.display = "none";
    successMsg.style.display = "none";

    let valid = true;

    if (password.value.length < 10) {
        passwordError.innerText = "Password must be at least 10 characters";
        passwordError.style.display = "block";
        password.classList.add("error");
        valid = false;
    }

    if (password.value !== confirmPassword.value) {
        confirmError.innerText = "Passwords do not match";
        confirmError.style.display = "block";
        confirmPassword.classList.add("error");
        valid = false;
    }

    if (!valid) return;

    successMsg.style.display = "block";
    form.reset();

    lengthRule.textContent = "❌ At least 10 characters in length";
    lengthRule.classList.remove("valid");
});
</script>

</body>
</html>
