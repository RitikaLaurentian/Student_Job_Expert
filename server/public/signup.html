<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Job Portal - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; }
        .wrapper { display: flex; height: 100vh; width: 100%; }
        .left {
            flex: 1; background: linear-gradient(rgba(106,17,203,0.7), rgba(37,117,252,0.7)), url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');
            background-size: cover; background-position: center; color: white; display: flex; flex-direction: column; justify-content: center; padding: 60px;
        }
        .left h1 { font-size: 40px; margin-bottom: 20px; }
        .left p { font-size: 18px; line-height: 1.6; max-width: 400px; }
        .right { flex: 1.2; background: #f4f6fb; display: flex; justify-content: center; align-items: center; }
        .form-box {
            width: 100%; max-width: 500px; background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .form-box h2 { text-align: center; margin-bottom: 20px; }
        .social-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 6px; color: white; font-size: 15px; cursor: pointer; transition: 0.3s; }
        .google { background: #db4437; }
        .facebook { background: #3b5998; }
        .twitter { background: #1da1f2; }
        .social-btn:hover { transform: scale(1.03); }
        .or { text-align: center; margin: 15px 0; color: gray; }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; transition: 0.3s; }
        .input-group input:focus, .input-group textarea:focus { border-color: #6a11cb; box-shadow: 0 0 5px rgba(106,17,203,0.3); }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 14px; border: none; background: linear-gradient(to right, #6a11cb, #2575fc); color: white; font-size: 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .signin { text-align: center; margin-top: 15px; }
        .signin a { color: #6a11cb; text-decoration: none; font-weight: bold; }
        .error-msg { color: red; margin-bottom: 15px; font-size: 14px; text-align: center; }
        @media(max-width:900px) { .wrapper { flex-direction: column; } .left { height: 250px; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="left">
            <h1>Welcome to Student Job Portal</h1>
            <p>Create your account to apply for part-time jobs, internships and student opportunities easily.</p>
        </div>
        <div class="right">
            <div class="form-box">
                <h2>Create Account</h2>
                <button class="social-btn google">Sign up with Google</button>
                <button class="social-btn facebook">Sign up with Facebook</button>
                <button class="social-btn twitter">Sign up with Twitter</button>
                <div class="or">or register with email</div>
                <div id="errorMsg" class="error-msg"></div>
                <form id="signupForm">
                    <div class="input-group"><input type="text" id="fullName" placeholder="Full Name" required></div>
                    <div class="input-group"><input type="email" id="email" placeholder="Email Address" required></div>
                    <div class="input-group"><input type="password" id="password" placeholder="Password" required></div>
                    <div class="input-group"><input type="tel" id="phone" placeholder="Phone Number" required></div>
                    <label>Experience Level:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="exp" value="Fresher" required> Fresher</label>
                        <label><input type="radio" name="exp" value="Experienced"> Experienced</label>
                    </div>
                    <div class="input-group"><textarea id="workExperience" placeholder="Work Experience (if any)"></textarea></div>
                    <button type="submit" class="btn">Create an account</button>
                </form>
                <div class="signin">I'm already a member! <a href="login.html">Sign In</a></div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;
            const experienceLevel = document.querySelector('input[name="exp"]:checked')?.value;
            const workExperience = document.getElementById('workExperience').value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = '';
            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, phone, experienceLevel, workExperience })
                });
                const data = await res.json();
                if (res.ok) window.location.href = data.redirect;
                else errorDiv.textContent = data.error || 'Signup failed';
            } catch (err) {
                errorDiv.textContent = 'Network error';
            }
        });
    </script>
</body>
</html>
